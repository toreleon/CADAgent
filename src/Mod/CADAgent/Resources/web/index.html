<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CAD Agent</title>
<!-- Served from QtWebEngine's builtin resource. Always available. -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
  :root {
    --bg: #1e1e1e; --bg-alt: #262626; --bg-code: #181818;
    --fg: #d4d4d4; --fg-dim: #858585; --fg-muted: #6b6b6b;
    --border: #3a3a3a; --border-soft: #2a2a2a;
    --accent: #e97b3f; --accent-hover: #f08a4a;
    --ok: #4cb860; --err: #e05757;
    --mono: ui-monospace, Menlo, Consolas, "DejaVu Sans Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  .stream { flex: 1; overflow-y: auto; padding: 8px 10px; }
  .stream::-webkit-scrollbar { width: 8px; }
  .stream::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .stream::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  .row { display: flex; gap: 8px; padding: 6px 4px; align-items: flex-start; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-top: 4px; flex: 0 0 auto;
    transition: background 0.2s, border-color 0.2s;
  }
  .dot.pending { background: transparent; border: 1.5px solid var(--fg-muted); }
  .dot.active  { background: var(--accent); }
  .dot.done    { background: var(--ok); }
  .dot.error   { background: var(--err); }

  .user    { padding: 8px 4px 4px 32px; color: var(--fg); font-weight: 500; }
  .system  { padding: 4px 4px 4px 32px; color: var(--fg-muted); }
  .err-text { color: var(--err); }

  .tool-title { font-weight: 600; }
  .tool-sub   { color: var(--fg-dim); margin-left: 8px; }
  .badge {
    display: inline-block; min-width: 32px; text-align: center;
    color: var(--fg-dim); background: var(--bg-alt);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 6px; font: 10px var(--mono); letter-spacing: 1px;
    margin-right: 8px; vertical-align: top;
  }
  pre.code {
    background: var(--bg-code); border: 1px solid var(--border-soft);
    border-radius: 4px; padding: 6px 8px; margin: 4px 0;
    font: 11px var(--mono); white-space: pre-wrap; word-break: break-word;
    color: var(--fg); display: inline-block; max-width: calc(100% - 48px);
    vertical-align: top;
  }
  .card .actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
  .apply, .reject {
    border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 11px;
  }
  .apply  { background: var(--ok); color: #0e1a10; border: none; font-weight: 600; }
  .apply:hover  { background: #5ec86e; }
  .reject { background: transparent; color: var(--fg-dim); border: 1px solid var(--border); }
  .reject:hover { color: var(--err); border-color: var(--err); }
  .pending-chip {
    color: var(--accent); border: 1px solid var(--accent);
    border-radius: 5px; padding: 1px 6px; font-size: 10px; margin-left: 8px;
  }

  .composer { padding: 10px; }
  .composer-frame {
    background: var(--bg-alt); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px 8px 12px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.15s;
  }
  .composer-frame:focus-within { border-color: var(--accent); }
  textarea#input {
    width: 100%; min-height: 32px; max-height: 200px;
    resize: none; background: transparent; color: var(--fg);
    border: none; outline: none; font: 12px inherit; line-height: 1.5;
    padding: 0;
  }
  textarea#input::placeholder { color: var(--fg-muted); }
  .toolbar { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: var(--fg-dim);
    border: none; cursor: pointer; padding: 0; border-radius: 4px;
  }
  .icon-btn:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
  .icon-btn svg { width: 14px; height: 14px; display: block; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--fg-dim);
    background: #2d2d2d; border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 7px; height: 22px;
  }
  .chip svg { width: 12px; height: 12px; opacity: 0.85; }
  .perm {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--fg-dim); padding: 0 6px; height: 22px;
  }
  .perm svg { width: 12px; height: 12px; opacity: 0.85; }
  .send, .stop {
    width: 26px; height: 26px; border-radius: 13px;
    display: inline-flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
  }
  .send { background: var(--accent); color: #1b1b1b; }
  .send svg { width: 14px; height: 14px; }
  .send:hover { background: var(--accent-hover); }
  .send:disabled { background: var(--border); color: var(--fg-muted); cursor: not-allowed; }
  .stop {
    background: transparent; color: var(--fg-dim);
    border: 1px solid var(--border); display: none;
  }
  .stop:hover { color: var(--err); border-color: var(--err); }
</style>
</head>
<body>
<div id="app">
  <div class="stream" id="stream"></div>
  <div class="composer">
    <div class="composer-frame">
      <textarea id="input" placeholder="Ask the CAD agent…" rows="1"></textarea>
      <div class="toolbar">
        <button class="icon-btn" title="Attach (coming soon)" aria-label="Attach">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button class="icon-btn" title="Commands (coming soon)" aria-label="Commands">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="17" y1="5" x2="7" y2="19"></line>
          </svg>
        </button>
        <span class="chip" title="Current context">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <span>CAD Agent</span>
        </span>
        <div style="flex:1"></div>
        <span id="perm" class="perm" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          <span>Bypass permissions</span>
        </span>
        <button id="stop" class="stop" title="Stop" aria-label="Stop">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"></rect></svg>
        </button>
        <button id="send" class="send" title="Send  (Ctrl+Enter)" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- DOM helpers ----------
const stream = document.getElementById('stream');
const input  = document.getElementById('input');
const send   = document.getElementById('send');
const stop   = document.getElementById('stop');
const perm   = document.getElementById('perm');

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls)       n.className   = cls;
  if (text != null) n.textContent = text;
  return n;
}
function scrollEnd() { stream.scrollTop = stream.scrollHeight; }
function shortTool(n) { return n.startsWith('mcp__cad__') ? n.slice(10) : n; }

// ---------- stream renderers ----------
function addSystem(t) { stream.appendChild(el('div', 'system', t)); scrollEnd(); }
function addUser(t)   { stream.appendChild(el('div', 'user',   t)); scrollEnd(); }
function addError(t)  {
  const r = el('div', 'row');
  r.appendChild(el('div', 'dot error'));
  r.appendChild(el('div', 'err-text', t));
  stream.appendChild(r); scrollEnd();
}

let currentAssistant = null;
function addAssistant(text) {
  if (!currentAssistant) {
    const r = el('div', 'row');
    const dot = el('div', 'dot active');
    const body = el('div'); body.style.whiteSpace = 'pre-wrap'; body.style.flex = '1';
    r.appendChild(dot); r.appendChild(body);
    stream.appendChild(r);
    currentAssistant = { dot, body };
  }
  currentAssistant.body.textContent += text;
  scrollEnd();
}
function closeAssistant() {
  if (currentAssistant) {
    currentAssistant.dot.classList.replace('active', 'done');
    currentAssistant = null;
  }
}

const toolEntries = new Map();
function addToolUse(id, name, inputJson) {
  closeAssistant();
  const r = el('div', 'row');
  const dot = el('div', 'dot pending');
  const col = el('div'); col.style.flex = '1'; col.style.minWidth = '0';

  const head = el('div');
  head.appendChild(el('span', 'tool-title', shortTool(name)));
  try {
    const obj = JSON.parse(inputJson);
    const s = Object.entries(obj).slice(0,4)
      .filter(([,v]) => typeof v !== 'object')
      .map(([k,v]) => `${k}=${v}`).join('  ');
    if (s) head.appendChild(el('span', 'tool-sub', s));
  } catch {}
  col.appendChild(head);

  const inWrap = el('div');
  inWrap.appendChild(el('span', 'badge', 'IN'));
  const pre = el('pre', 'code');
  try { pre.textContent = JSON.stringify(JSON.parse(inputJson), null, 2); }
  catch { pre.textContent = inputJson; }
  inWrap.appendChild(pre);
  col.appendChild(inWrap);

  const outSlot = el('div'); col.appendChild(outSlot);
  r.appendChild(dot); r.appendChild(col);
  stream.appendChild(r); scrollEnd();
  toolEntries.set(id, { dot, outSlot });
}
function addToolResult(id, contentJson, isError) {
  const entry = toolEntries.get(id);
  if (!entry) return;
  entry.dot.classList.remove('pending');
  entry.dot.classList.add(isError ? 'error' : 'done');

  let text;
  try {
    const c = JSON.parse(contentJson);
    if (Array.isArray(c) && c[0] && c[0].text) text = c[0].text;
    else text = JSON.stringify(c, null, 2);
  } catch { text = contentJson; }

  const wrap = el('div');
  wrap.appendChild(el('span', 'badge', isError ? 'ERR' : 'OUT'));
  const pre = el('pre', 'code');
  pre.textContent = text.slice(0, 2000);
  if (isError) pre.style.color = 'var(--err)';
  wrap.appendChild(pre);
  entry.outSlot.appendChild(wrap);
  toolEntries.delete(id);
  scrollEnd();
}

function addPermissionCard(reqId, name, inputJson) {
  closeAssistant();
  const r = el('div', 'row card');
  const dot = el('div', 'dot active');
  const col = el('div'); col.style.flex = '1'; col.style.minWidth = '0';

  const head = el('div');
  head.appendChild(el('span', 'tool-title', shortTool(name)));
  head.appendChild(el('span', 'pending-chip', 'pending approval'));
  col.appendChild(head);

  const pre = el('pre', 'code');
  try { pre.textContent = JSON.stringify(JSON.parse(inputJson), null, 2); }
  catch { pre.textContent = inputJson; }
  col.appendChild(pre);

  const actions = el('div', 'actions');
  const reject = el('button', 'reject', 'Reject');
  const apply  = el('button', 'apply',  'Apply');
  actions.appendChild(reject);
  actions.appendChild(apply);
  col.appendChild(actions);

  r.appendChild(dot); r.appendChild(col);
  stream.appendChild(r); scrollEnd();

  let decided = false;
  const finish = (allowed, reason, cls) => {
    if (decided) return;
    decided = true;
    apply.disabled = reject.disabled = true;
    dot.classList.remove('active'); dot.classList.add(cls);
    window.bridge.decidePermission(reqId, allowed, reason);
  };
  apply.onclick  = () => finish(true,  '', 'done');
  reject.onclick = () => finish(false, 'User rejected this action.', 'error');
}

// ---------- composer ----------
function doSend() {
  const text = input.value.trim();
  if (!text || !window.bridge) return;
  addUser(text);
  input.value = '';
  input.style.height = 'auto';
  send.disabled = true;
  send.style.display = 'none'; stop.style.display = 'inline-flex';
  window.bridge.submit(text);
}
send.addEventListener('click', doSend);
stop.addEventListener('click', () => { if (window.bridge) window.bridge.stop(); });
input.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doSend(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(200, input.scrollHeight) + 'px';
});

// ---------- bridge wiring ----------
function onTurnComplete(cost) {
  closeAssistant();
  if (cost >= 0) addSystem(`turn complete · $${cost.toFixed(4)}`);
  send.disabled = false;
  send.style.display = 'inline-flex'; stop.style.display = 'none';
  input.focus();
}

new QWebChannel(qt.webChannelTransport, (channel) => {
  const bridge = channel.objects.bridge;
  window.bridge = bridge;
  bridge.assistantText.connect(addAssistant);
  bridge.thinkingText.connect(() => {}); // TODO: render a thinking row
  bridge.toolUse.connect(addToolUse);
  bridge.toolResult.connect(addToolResult);
  bridge.permissionRequest.connect(addPermissionCard);
  bridge.turnComplete.connect(onTurnComplete);
  bridge.errorText.connect(addError);
  bridge.systemText.connect(addSystem);
  bridge.bypassChanged.connect((on) => { perm.style.display = on ? '' : 'none'; });
  addSystem('CAD Agent ready. Ask me to model something.');
  input.focus();
});
</script>
</body>
</html>
